<!DOCTYPE html>
<html>
<head>
<title>BOB TEXTILE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;padding-top:80px;}
.top-marquee{background:#111;position:fixed;top:0;width:100%;height:45px;display:flex;align-items:center;z-index:3000;}
.logo{height:45px;}
.admin-icon{margin-left:auto;padding:10px;color:white;cursor:pointer;}
.category-bar{position:fixed;top:45px;width:100%;height:40px;background:#222;display:flex;overflow-x:auto;}
.category-btn{color:white;padding:6px 14px;margin:5px;border-radius:20px;cursor:pointer;}
.category-btn.active{background:#25D366;}
.view{display:none;padding:10px;}
.active-view{display:block;}
.card{background:white;border-radius:12px;padding:10px;margin-bottom:15px;}
.carousel{display:flex;overflow-x:auto;}
.carousel img{min-width:100%;height:300px;object-fit:cover;}
.price{background:#111;color:white;text-align:center;padding:10px;border-radius:8px;}
.buy-btn{background:#25D366;color:white;border:none;width:100%;padding:10px;margin-top:10px;border-radius:10px;}
.admin{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:white;z-index:5000;padding:10px;overflow:auto;}
.btn{width:100%;padding:10px;background:green;color:white;border:none;margin-top:5px;}
</style>
</head>

<body>

<div class="top-marquee">
<img src="logo.jpeg" class="logo">
<div class="admin-icon" onclick="openAdmin()">🔒</div>
</div>

<div class="category-bar" id="categoryBar"></div>

<div id="aboutView" class="view active-view">
<h2>Welcome to BOB TEXTILE</h2>
<div id="testimonialCarousel"></div>
</div>

<div class="admin" id="adminPanel">
<h3>Admin Panel</h3>

<input id="aName" placeholder="Product name">
<input id="aPrice" placeholder="Price">
<select id="aCategory"></select>

<button class="btn" onclick="uploadImage()">Upload Images</button>
<button class="btn" onclick="addProduct()">Save Product</button>

<hr>

<input id="newCat" placeholder="New Category">
<button class="btn" onclick="addCategory()">Add Category</button>

<hr>

<button class="btn" onclick="uploadTestimonials()">Upload Testimonial</button>

<hr>

<button class="btn" onclick="closeAdmin()" style="background:red;">Close</button>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6ZaMnWKJEvSUlJgh31tU6rj8CvuietuM",
  authDomain: "bob-26647.firebaseapp.com",
  projectId: "bob-26647",
  storageBucket: "bob-26647.firebasestorage.app",
  messagingSenderId: "468659293220",
  appId: "1:468659293220:web:507832347dc70ab78ddcb1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products = [];
let categories = [];
let testimonials = [];
let uploadedImages = [];

/* CATEGORY */
async function loadCategories(){
  const snap = await getDocs(collection(db,"categories"));
  categories = [];
  snap.forEach(d=>categories.push(d.id));
  renderCategories();
}

function renderCategories(){
  let bar = document.getElementById("categoryBar");
  let sel = document.getElementById("aCategory");

  bar.innerHTML="";
  sel.innerHTML="";

  let about=document.createElement("div");
  about.className="category-btn active";
  about.innerText="ABOUT";
  about.onclick=()=>showView("about",about);
  bar.appendChild(about);

  categories.forEach(cat=>{
    let btn=document.createElement("div");
    btn.className="category-btn";
    btn.innerText=cat;
    btn.onclick=()=>showView(cat,btn);
    bar.appendChild(btn);

    let opt=document.createElement("option");
    opt.value=cat;
    opt.textContent=cat;
    sel.appendChild(opt);

    if(!document.getElementById(cat+"View")){
      let div=document.createElement("div");
      div.id=cat+"View";
      div.className="view";
      document.body.appendChild(div);
    }
  });
}

async function addCategory(){
  let val=document.getElementById("newCat").value;
  await setDoc(doc(db,"categories",val),{name:val});
  loadCategories();
}

/* PRODUCTS */
async function loadProducts(){
  const q=query(collection(db,"products"),orderBy("date","desc"));
  const snap=await getDocs(q);
  products=[];
  snap.forEach(d=>products.push({id:d.id,...d.data()}));
}

async function addProduct(){
  await addDoc(collection(db,"products"),{
    name:aName.value,
    price:aPrice.value,
    category:aCategory.value,
    images:uploadedImages,
    date:Date.now()
  });
  uploadedImages=[];
  loadProducts();
}

/* VIEW */
function showView(cat,el){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active-view"));
  document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");

  if(cat==="about"){
    document.getElementById("aboutView").classList.add("active-view");
    return;
  }

  let view=document.getElementById(cat+"View");
  let list=products.filter(p=>p.category===cat);

  let html="";
  list.forEach(p=>{
    html+=`
    <div class="card">
      <div class="carousel">
        ${p.images.map(i=>`<img src="${i}">`).join("")}
      </div>
      <div class="price">₦${p.price}</div>
      <button class="buy-btn" onclick="buy('${p.name}','${p.price}')">BUY</button>
    </div>`;
  });

  view.innerHTML=html;
  view.classList.add("active-view");
}

/* BUY */
window.buy=(name,price)=>{
  let msg=`Hello, I want ${name} for ₦${price}`;
  window.open("https://wa.me/2349114738932?text="+encodeURIComponent(msg));
}

/* IMAGE */
window.uploadImage=()=>{
  cloudinary.openUploadWidget({
    cloudName:"db92r6j9z",
    uploadPreset:"ummuhalti",
    multiple:true
  },(e,r)=>{
    if(r && r.event==="success"){
      uploadedImages.push(r.info.secure_url);
    }
  });
};

/* TESTIMONIAL */
async function loadTestimonials(){
  const snap=await getDocs(collection(db,"testimonials"));
  testimonials=[];
  snap.forEach(d=>testimonials.push(d.data()));

  let box=document.getElementById("testimonialCarousel");
  box.innerHTML=testimonials.map(t=>`<img src="${t.image}" width="100%">`).join("");
}

window.uploadTestimonials=()=>{
  cloudinary.openUploadWidget({
    cloudName:"db92r6j9z",
    uploadPreset:"ummuhalti"
  },async (e,r)=>{
    if(r && r.event==="success"){
      await addDoc(collection(db,"testimonials"),{
        image:r.info.secure_url
      });
      loadTestimonials();
    }
  });
};

/* ADMIN */
window.openAdmin=()=>{
  if(prompt("Password")=="1234"){
    document.getElementById("adminPanel").style.display="block";
  }
};
window.closeAdmin=()=>{
  document.getElementById("adminPanel").style.display="none";
};

/* INIT */
window.addEventListener("DOMContentLoaded",async ()=>{
  await loadCategories();
  await loadProducts();
  await loadTestimonials();
});

</script>

</body>
</html>
